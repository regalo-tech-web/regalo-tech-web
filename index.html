<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Tech | Tu tienda online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-[#fff159] p-4 shadow-md">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between">
            <h1 class="text-2xl font-bold text-slate-800">REGALO TECH</h1>
            <input type="text" placeholder="Buscar productos, marcas y más..." class="w-full md:w-1/2 p-2 mt-2 md:mt-0 rounded-sm shadow-sm outline-none">
            <div class="hidden md:block text-sm text-slate-700 font-medium">Envios a toda Argentina 🇦🇷</div>
        </div>
    </nav>

    <div class="bg-white border-b overflow-x-auto">
        <div class="container mx-auto flex gap-6 p-3 text-sm text-gray-600 whitespace-nowrap">
            <a href="#" class="hover:text-blue-500">Tecnología</a>
            <a href="#" class="hover:text-blue-500">Cotillón</a>
            <a href="#" class="hover:text-blue-500">Hogar</a>
            <a href="#" class="hover:text-blue-500">Mascotas</a>
            <a href="#" class="hover:text-blue-500">Infantil</a>
            <a href="#" class="hover:text-blue-500">Uso Personal</a>
        </div>
    </div>

    <main class="container mx-auto mt-6 px-4">
        <div class="w-full h-48 md:h-64 bg-blue-600 rounded-lg flex items-center justify-center text-white text-3xl font-bold shadow-lg">
            ¡Bienvenidos a Regalo Tech!
        </div>

        <h2 class="text-xl font-semibold mt-8 mb-4 text-gray-700">Ofertas destacadas</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded shadow-sm hover:shadow-md transition cursor-pointer">
                <div class="h-40 bg-gray-200 rounded mb-2"></div>
                <p class="text-sm text-gray-800">Producto de Tecnología</p>
                <p class="text-lg font-bold text-gray-900">$ 15.500</p>
                <p class="text-green-600 text-xs font-bold">Llega gratis mañana</p>
            </div>
        </div>
    </main>

</body>
</html>
