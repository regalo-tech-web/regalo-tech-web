<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Tech | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rtLtBlue: '#dceef3', rtMidBlue: '#7fc6df', rtMainBlue: '#437ea7', rtDarkBlue: '#3f5173', 
                    },
                    fontFamily: { serif: ['Crimson Pro', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .product-card { border-color: #dceef3; transition: all 0.3s ease; height: 100%; display: flex; flex-direction: column; }
        .product-card:hover { border-color: #7fc6df; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(63,81,115,0.1); }
        .btn-buy { background-color: #437ea7; color: white; transition: all 0.3s ease; border-radius: 12px; cursor: pointer; }
        .btn-buy:hover { background-color: #3f5173; }
        
        /* Carrito Lateral */
        #cart-drawer { position: fixed; right: -100%; top: 0; width: 350px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); padding: 20px; }
        #cart-drawer.open { right: 0; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 150; }

        .carousel-container { position: relative; overflow: hidden; height: 100%; width: 100%; }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .carousel-item { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(63, 81, 115, 0.9); backdrop-filter: blur(4px); }
        .modal-content { background-color: white; margin: 5% auto; padding: 40px; border-radius: 30px; width: 90%; max-width: 900px; position: relative; }

        .whatsapp-btn { position: fixed; bottom: 25px; right: 25px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; }
    </style>
</head>
<body class="bg-rtLtBlue font-sans text-rtDarkBlue">

    <div id="overlay" class="overlay" onclick="toggleCart()"></div>

    <div id="cart-drawer">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Tu Carrito</h2>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="text-sm text-gray-500 italic">
            El carrito está vacío temporalmente. ¡Pronto podrás sumar varios productos!
        </div>
        <div class="absolute bottom-6 left-6 right-6">
            <button class="w-full btn-buy py-3 font-bold uppercase">Finalizar Pedido</button>
        </div>
    </div>

    <header class="bg-white px-6 py-3 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <a href="#" class="flex items-center">
                <img src="logo-regalo-tech.png.png" alt="Regalo Tech" class="h-16 w-auto object-contain">
            </a>
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Buscar por nombre..." class="w-full bg-slate-50 border border-rtLtBlue rounded-full py-2 px-6 focus:outline-none focus:border-rtMidBlue text-sm">
                <i class="fas fa-search absolute right-5 top-3 text-rtMidBlue"></i>
            </div>
            <div class="flex gap-6 items-center">
                <button onclick="alert('Sección en mantenimiento. ¡Pronto podrás registrarte!')" class="text-xs font-bold uppercase tracking-widest text-rtMainBlue hover:text-rtDarkBlue">Mi Cuenta</button>
                <button onclick="toggleCart()" class="relative">
                    <i class="fas fa-shopping-cart text-lg text-rtDarkBlue"></i>
                    <span class="absolute -top-2 -right-2 bg-rtMainBlue text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <div class="w-full h-auto min-h-[300px] bg-rtDarkBlue rounded-3xl flex items-center justify-center shadow-2xl mb-12 overflow-hidden relative border border-rtMainBlue py-12">
            <div class="z-10 text-center text-white p-6 w-full max-w-5xl">
                <h2 class="font-serif text-5xl md:text-6xl font-bold uppercase mb-2">Regalo Tech</h2>
                <div class="h-[2px] w-40 bg-rtMidBlue mx-auto mb-10 opacity-80"></div>
                <div class="flex flex-wrap justify-center gap-3 text-xs font-bold tracking-widest uppercase">
                    <a href="#personal" class="px-5 py-2.5 border border-rtMidBlue/50 rounded-full hover:bg-rtMidBlue transition-all">Uso Personal</a>
                    <a href="#tecnologia" class="px-5 py-2.5 border border-rtMidBlue/50 rounded-full hover:bg-rtMidBlue transition-all">Tecnología</a>
                </div>
            </div>
        </div>

        <section id="personal" class="mb-20 category-section">
            <h2 class="text-3xl font-serif font-bold text-rtDarkBlue mb-8 flex items-center gap-4">Uso Personal</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="bg-white p-6 rounded-2xl product-card border product-item" data-name="antifaz hedwig harry potter">
                    <img src="antifaz-1.png" class="h-48 w-full object-contain mb-4">
                    <h3 class="text-sm font-semibold mb-2">Antifaz Para Dormir Hedwig</h3>
                    <p class="text-2xl font-bold mb-4">$ 30.499</p>
                    <button onclick="openModal('modalAnti')" class="w-full py-2 border border-rtMainBlue text-rtMainBlue rounded-xl text-[10px] font-bold uppercase mb-2">Ver más</button>
                    <button onclick="toggleCart()" class="btn-buy w-full py-3 text-xs font-bold uppercase">Comprar</button>
                </div>
            </div>
        </section>

        <section id="tecnologia" class="mb-20 category-section">
            <h2 class="text-3xl font-serif font-bold text-rtDarkBlue mb-8">Tecnología</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="bg-white p-6 rounded-2xl product-card border product-item" data-name="auricular samsung akg tipo c">
                    <img src="aur-samsung-1.png" class="h-48 w-full object-contain mb-4">
                    <h3 class="text-sm font-semibold mb-2">Auricular Samsung AKG Tipo C</h3>
                    <p class="text-2xl font-bold mb-4">$ 15.299</p>
                    <button onclick="toggleCart()" class="btn-buy w-full py-3 text-xs font-bold uppercase">Comprar</button>
                </div>
                </div>
        </section>
    </main>

    <footer class="bg-rtDarkBlue py-16 text-center text-white">
        <img src="logo-regalo-tech.png.png" alt="Regalo Tech" class="h-24 w-auto mx-auto mb-6"> <p class="text-[10px] tracking-[0.3em] text-rtMidBlue uppercase">Tecnología · Regalos · Y más</p>
    </footer>

    <script>
        // Función de Búsqueda
        function filterProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let products = document.getElementsByClassName('product-item');
            
            for (let i = 0; i < products.length; i++) {
                let name = products[i].getAttribute('data-name');
                if (name.includes(input)) {
                    products[i].style.display = "flex";
                } else {
                    products[i].style.display = "none";
                }
            }
        }

        // Función de Carrito
        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('open');
            let overlay = document.getElementById('overlay');
            overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
        }

        // Modales (simplificado para el ejemplo)
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
