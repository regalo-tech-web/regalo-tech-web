<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Tech | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rtLtBlue: '#dceef3', rtMidBlue: '#7fc6df', rtMainBlue: '#437ea7', rtDarkBlue: '#3f5173', 
                    },
                    fontFamily: { serif: ['Crimson Pro', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .product-card { border-color: #dceef3; transition: all 0.3s ease; height: 100%; display: flex; flex-direction: column; background: white; border-radius: 1.5rem; padding: 1.5rem; border-width: 1px; }
        .product-card:hover { border-color: #7fc6df; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(63,81,115,0.1); }
        .btn-buy { background-color: #437ea7; color: white; transition: all 0.3s ease; border-radius: 12px; cursor: pointer; }
        .btn-buy:hover { background-color: #3f5173; }
        
        /* Carrusel e Imágenes */
        .carousel-container { position: relative; overflow: hidden; width: 100%; height: 200px; border-radius: 1rem; margin-bottom: 1rem; }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .carousel-item { min-width: 100%; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .carousel-item img { max-height: 100%; object-fit: contain; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #437ea7; z-index: 10; }

        /* Carrito Lateral */
        #cart-drawer { position: fixed; right: -100%; top: 0; width: 350px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #cart-drawer.open { right: 0; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 150; }

        /* Modales */
        .modal { display: none; position: fixed; z-index: 300; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(63, 81, 115, 0.9); backdrop-filter: blur(4px); overflow-y: auto; }
        .modal-content { background-color: white; margin: 5% auto; padding: 40px; border-radius: 30px; width: 90%; max-width: 900px; position: relative; }

        .whatsapp-btn { position: fixed; bottom: 25px; right: 25px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; }
    </style>
</head>
<body class="bg-rtLtBlue font-sans text-rtDarkBlue">
    <div id="overlay" class="overlay" onclick="toggleCart()"></div>

    <div id="cart-drawer">
        <div class="p-6 flex justify-between items-center border-b">
            <h2 class="text-xl font-bold">Tu Carrito</h2>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items-container" class="flex-grow overflow-y-auto p-6 space-y-4">
            <p id="empty-cart-msg" class="text-gray-400 italic text-center">Tu carrito está vacío</p>
        </div>
        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between font-bold text-lg mb-4">
                <span>Total:</span>
                <span id="cart-total">$ 0</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full btn-buy py-4 font-bold uppercase shadow-lg">Finalizar por WhatsApp</button>
        </div>
    </div>

    <header class="bg-white px-6 py-3 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <a href="#"><img src="logo-regalo-tech.png.png" alt="Regalo Tech" class="h-16 w-auto object-contain"></a>
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="¿Qué estás buscando hoy?" class="w-full bg-slate-50 border border-rtLtBlue rounded-full py-2.5 px-6 focus:outline-none focus:border-rtMidBlue text-sm">
                <i class="fas fa-search absolute right-5 top-3.5 text-rtMidBlue"></i>
            </div>
            <div class="flex gap-6 items-center">
                <button onclick="alert('Próximamente')" class="text-[11px] font-bold uppercase tracking-widest text-rtMainBlue hover:text-rtDarkBlue">Mi Cuenta</button>
                <button onclick="toggleCart()" class="relative">
                    <i class="fas fa-shopping-cart text-lg"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-rtMainBlue text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <div class="w-full h-auto min-h-[300px] bg-rtDarkBlue rounded-[2.5rem] flex items-center justify-center shadow-2xl mb-12 overflow-hidden relative border border-rtMainBlue py-12">
            <div class="z-10 text-center text-white p-6 w-full max-w-5xl">
                <h2 class="font-serif text-5xl md:text-6xl font-bold uppercase mb-2 tracking-tight">Regalo Tech</h2>
                <div class="h-[2px] w-40 bg-rtMidBlue mx-auto mb-10 opacity-80"></div>
                <div class="flex flex-wrap justify-center gap-3 text-[10px] font-bold tracking-widest uppercase">
                    <a href="#personal" class="px-6 py-3 border border-rtMidBlue/50 rounded-full hover:bg-rtMidBlue transition-all">Uso Personal</a>
                    <a href="#tecnologia" class="px-6 py-3 border border-rtMidBlue/50 rounded-full hover:bg-rtMidBlue transition-all">Tecnología</a>
                </div>
            </div>
        </div>
        <section id="personal" class="mb-20">
            <h2 class="text-3xl font-serif font-bold mb-8 flex items-center gap-4"><span class="h-[2px] w-12 bg-rtMidBlue"></span> Uso Personal</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="product-card product-item" data-name="antifaz hedwig harry potter">
                    <div class="carousel-container" onclick="zoomImg('antifaz-1.png')">
                        <div class="carousel-track"><div class="carousel-item"><img src="antifaz-1.png"></div></div>
                    </div>
                    <h3 class="text-sm font-semibold mb-2">Antifaz Para Dormir Hedwig</h3>
                    <p class="text-2xl font-bold mb-4">$ 30.499</p>
                    <button onclick="openModal('modalAnti')" class="w-full py-2 border border-rtMainBlue text-rtMainBlue rounded-xl text-[10px] font-bold uppercase mb-2">Ver más</button>
                    <button onclick="addToCart('Antifaz Hedwig', 30499)" class="btn-buy w-full py-3 text-xs font-bold uppercase">Comprar</button>
                </div>
            </div>
        </section>

        <section id="tecnologia" class="mb-20">
            <h2 class="text-3xl font-serif font-bold mb-8 flex items-center gap-4"><span class="h-[2px] w-12 bg-rtMidBlue"></span> Tecnología</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="product-card product-item" data-name="auricular samsung akg tipo c">
                    <div class="carousel-container" onclick="zoomImg('aur-samsung-1.png')">
                        <div class="carousel-track"><div class="carousel-item"><img src="aur-samsung-1.png"></div></div>
                    </div>
                    <h3 class="text-sm font-semibold mb-2">Auricular Samsung AKG Tipo C</h3>
                    <p class="text-2xl font-bold mb-4">$ 15.299</p>
                    <button onclick="addToCart('Auricular Samsung AKG', 15299)" class="btn-buy w-full py-3 text-xs font-bold uppercase">Comprar</button>
                </div>
                <div class="product-card product-item" data-name="cargador auto 3 en 1 digital">
                    <div class="carousel-container" onclick="zoomImg('car-auto-1.png')">
                        <div class="carousel-track"><div class="carousel-item"><img src="car-auto-1.png"></div></div>
                    </div>
                    <h3 class="text-sm font-semibold mb-2">Cargador Auto + Cable 3 En 1</h3>
                    <p class="text-2xl font-bold mb-4">$ 23.999</p>
                    <button onclick="addToCart('Cargador Auto 3-en-1', 23999)" class="btn-buy w-full py-3 text-xs font-bold uppercase">Comprar</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-rtDarkBlue py-16 text-center text-white">
        <img src="logo-regalo-tech.png.png" alt="Regalo Tech" class="h-24 w-auto mx-auto mb-6">
        <p class="text-[10px] tracking-[0.3em] text-rtMidBlue uppercase">Tecnología · Regalos · Y más</p>
    </footer>

    <script>
        let cart = [];
        function addToCart(name, price) {
            cart.push({name, price});
            updateCartUI();
            toggleCart(true);
        }
        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            container.innerHTML = cart.length === 0 ? '<p class="text-gray-400 italic text-center">Tu carrito está vacío</p>' : "";
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg"><div class="text-sm font-bold">${item.name}</div><button onclick="removeItem(${index})" class="text-red-400 text-xs">Eliminar</button></div>`;
            });
            totalEl.innerText = `$ ${total.toLocaleString()}`;
            countEl.innerText = cart.length;
        }
        function removeItem(index) { cart.splice(index, 1); updateCartUI(); }
        function checkoutWhatsApp() {
            if(cart.length === 0) return alert("Carrito vacío");
            let msg = "¡Hola! Pedido de Regalo Tech:\n";
            let total = 0;
            cart.forEach(i => { msg += `- ${i.name} ($${i.price})\n`; total += i.price; });
            msg += `\nTotal: $${total}`;
            window.open(`https://wa.me/5491139414195?text=${encodeURIComponent(msg)}`, '_blank');
        }
        function toggleCart(open) {
            const d = document.getElementById('cart-drawer');
            const o = document.getElementById('overlay');
            if(open === true) { d.classList.add('open'); o.style.display = 'block'; }
            else { d.classList.toggle('open'); o.style.display = o.style.display === 'block' ? 'none' : 'block'; }
        }
        function filterProducts() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            let items = document.getElementsByClassName('product-item');
            for(let i of items) { i.style.display = i.getAttribute('data-name').includes(val) ? "flex" : "none"; }
        }
    </script>
</body>
</html>
