<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Tech | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { rtLtBlue: '#dceef3', rtMidBlue: '#7fc6df', rtMainBlue: '#437ea7', rtDarkBlue: '#3f5173' }, fontFamily: { serif: ['Crimson Pro', 'serif'], sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        /* Textura del Banner */
        .bg-texture { background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.1; position: absolute; inset: 0; }
        /* Carrito Lateral */
        #cart-drawer { position: fixed; right: -100%; top: 0; width: 350px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #cart-drawer.open { right: 0; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 150; }
        .product-card { border-radius: 1.5rem; transition: 0.3s; border: 1px solid #dceef3; background: white; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: #7fc6df; }
    </style>
</head>
<body class="bg-rtLtBlue font-sans text-rtDarkBlue">
    <div id="overlay" class="overlay" onclick="toggleCart()"></div>
    
    <div id="cart-drawer">
        <div class="p-6 border-b flex justify-between items-center"><h2 class="text-xl font-bold">Pedido</h2><button onclick="toggleCart()" class="text-2xl">&times;</button></div>
        <div id="cart-items" class="flex-grow p-6 overflow-y-auto space-y-4"></div>
        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between font-bold mb-4"><span>Total:</span><span id="cart-total">$ 0</span></div>
            <button onclick="checkout()" class="w-full bg-rtMainBlue text-white py-4 rounded-xl font-bold uppercase">Finalizar por WhatsApp</button>
        </div>
    </div>

    <header class="bg-white px-6 py-3 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <img src="logo-regalo-tech.png.png" class="h-12">
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" onkeyup="smartSearch()" placeholder="¿Qué buscas?" class="w-full bg-slate-50 border rounded-full py-2 px-6 focus:outline-none text-sm">
                <div id="suggestions" class="absolute w-full bg-white mt-1 rounded-xl shadow-lg hidden z-50 border"></div>
            </div>
            <div class="flex gap-4">
                <button onclick="alert('✨ Sección disponible pronto ✨')" class="text-xs font-bold uppercase text-rtMainBlue">Mi Cuenta</button>
                <button onclick="toggleCart()" class="relative"><i class="fas fa-shopping-cart"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-rtMainBlue text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">0</span></button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <div class="w-full h-64 bg-rtDarkBlue rounded-[2.5rem] relative flex items-center justify-center overflow-hidden border border-rtMainBlue shadow-xl mb-12">
            <div class="bg-texture"></div>
            <div class="relative z-10 text-center text-white">
                <h1 class="font-serif text-5xl font-bold mb-4">REGALO TECH</h1>
                <div class="flex gap-4 justify-center text-[10px] font-bold uppercase tracking-widest">
                    <a href="#personal" class="px-4 py-2 border border-rtMidBlue/50 rounded-full">Uso Personal</a>
                    <a href="#tecnologia" class="px-4 py-2 border border-rtMidBlue/50 rounded-full">Tecnología</a>
                </div>
            </div>
        </div>

        <div id="product-grid"></div>
    </main>

    <script>
        let cart = [];
        function toggleCart(f) { 
            const d = document.getElementById('cart-drawer'); const o = document.getElementById('overlay');
            if(f) { d.classList.add('open'); o.style.display='block'; } else { d.classList.toggle('open'); o.style.display = o.style.display==='block'?'none':'block'; }
        }
        function smartSearch() { /* Lo configuraremos cuando pongamos los productos */ }
    </script>
</body>
</html>
